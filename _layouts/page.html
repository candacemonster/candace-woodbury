---
layout: default
---

<article class="page">
  <div class="container">
    <header class="page-header">
      <h1>{{ page.title }}</h1>
    </header>
    
    <div class="page-content">
      {{ content }}
    </div>

    {% if page.notes %}
    <footer class="page-notes">
      {{ page.notes }}
    </footer>
    {% endif %}
  </div>
</article>
