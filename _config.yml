# Site settings
title: candace woodbury
description: essays, field notes, and gear from an introvert outside on purpose
url: "https://candacewoodbury.com"
baseurl: ""

# Author
author:
  name: candace woodbury
  email: hello@candacewoodbury.com
  linkedin: candacewoodbury
  youtube: candacewoodbury

# Build settings
markdown: kramdown
permalink: /blog/:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation
navigation:
  - title: about & contact
    url: /pages/connect
  - title: notebook
    url: /blog
  - title: gear & resources
    url: /pages/gear
  - title: policies
    url: /pages/policies

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .jekyll-cache
  - .htaccess

sass:
  style: compressed
  sass_dir: _sass